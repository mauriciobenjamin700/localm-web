<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>localm-web · structured-output demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      body {
        max-width: 960px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        color: #888;
        margin-top: 0;
        font-size: 0.9rem;
      }
      .row {
        display: flex;
        gap: 0.5rem;
        margin: 0.75rem 0;
        align-items: center;
        flex-wrap: wrap;
      }
      select,
      input,
      button,
      textarea {
        font: inherit;
        padding: 0.5rem 0.75rem;
        border-radius: 0.375rem;
        border: 1px solid #8884;
        background: transparent;
        color: inherit;
      }
      input,
      textarea {
        flex: 1;
      }
      textarea {
        min-height: 4rem;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.85rem;
      }
      button {
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      progress {
        flex: 1;
      }
      .pane {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-top: 1rem;
      }
      .pane > section {
        background: #8881;
        padding: 1rem;
        border-radius: 0.5rem;
        min-height: 12rem;
      }
      .pane h2 {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #888;
        margin: 0 0 0.5rem;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.85rem;
      }
      .err {
        color: #c33;
      }
      #status {
        font-size: 0.85rem;
        color: #888;
      }
      fieldset {
        border: 1px solid #8884;
        border-radius: 0.5rem;
        padding: 0.75rem 1rem;
        margin: 0;
      }
      legend {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #888;
        padding: 0 0.5rem;
      }
      label.inline {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>localm-web · structured output</h1>
    <p class="subtitle">
      Force the model to emit valid JSON — either free-form (<code>json: true</code>) or constrained
      to a JSON Schema (<code>jsonSchema</code>) via WebLLM + xgrammar.
    </p>

    <div class="row">
      <label for="model-select">Model</label>
      <select id="model-select">
        <option value="qwen2.5-1.5b-int4">qwen2.5-1.5b-int4 (smallest)</option>
        <option value="llama-3.2-1b-int4">llama-3.2-1b-int4</option>
        <option value="phi-3.5-mini-int4">phi-3.5-mini-int4 (largest)</option>
      </select>
      <button id="load-btn">Load model</button>
    </div>

    <div class="row">
      <progress id="load-progress" value="0" max="1"></progress>
      <span id="status">idle</span>
    </div>

    <fieldset>
      <legend>Mode</legend>
      <div class="row">
        <label class="inline"
          ><input type="radio" name="mode" value="json" checked />
          <code>json: true</code> · free-form JSON</label
        >
        <label class="inline"
          ><input type="radio" name="mode" value="schema" />
          <code>jsonSchema</code> · constrained decoding</label
        >
      </div>
    </fieldset>

    <div class="row">
      <textarea id="prompt" placeholder="Prompt the model…" disabled>
Extract user info from: 'Ada, 36, loves analytical engines and Lord Byron'.</textarea
      >
    </div>

    <details>
      <summary><strong>Schema (used only in <code>jsonSchema</code> mode)</strong></summary>
      <textarea id="schema" rows="14">
{
  "type": "object",
  "required": ["name", "age", "interests"],
  "properties": {
    "name": { "type": "string" },
    "age": { "type": "integer", "minimum": 0 },
    "interests": {
      "type": "array",
      "items": { "type": "string" },
      "minItems": 1
    }
  }
}</textarea
      >
    </details>

    <div class="row">
      <button id="send-btn" disabled>Generate</button>
    </div>

    <div class="pane">
      <section>
        <h2>Raw output (<code>reply.text</code>)</h2>
        <pre id="raw"></pre>
      </section>
      <section>
        <h2>Parsed JSON (<code>reply.json()</code>)</h2>
        <pre id="parsed"></pre>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
