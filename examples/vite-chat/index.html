<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>localm-web · vite-chat example</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      body {
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        color: #888;
        margin-top: 0;
        font-size: 0.9rem;
      }
      .row {
        display: flex;
        gap: 0.5rem;
        margin: 0.75rem 0;
        align-items: center;
      }
      select,
      input,
      button,
      textarea {
        font: inherit;
        padding: 0.5rem 0.75rem;
        border-radius: 0.375rem;
        border: 1px solid #8884;
        background: transparent;
        color: inherit;
      }
      input,
      textarea {
        flex: 1;
      }
      button {
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      progress {
        flex: 1;
      }
      #output {
        white-space: pre-wrap;
        background: #8881;
        padding: 1rem;
        border-radius: 0.5rem;
        min-height: 6rem;
        margin-top: 1rem;
      }
      #status {
        font-size: 0.85rem;
        color: #888;
      }
    </style>
  </head>
  <body>
    <h1>localm-web · Chat demo</h1>
    <p class="subtitle">Phi-3.5, Llama-3.2 or Qwen2.5 running on your GPU via WebGPU.</p>

    <div class="row">
      <label for="model-select">Model</label>
      <select id="model-select">
        <option value="qwen2.5-1.5b-int4">qwen2.5-1.5b-int4 (smallest)</option>
        <option value="llama-3.2-1b-int4">llama-3.2-1b-int4</option>
        <option value="phi-3.5-mini-int4">phi-3.5-mini-int4 (largest)</option>
      </select>
      <button id="load-btn">Load model</button>
    </div>

    <div class="row">
      <progress id="load-progress" value="0" max="1"></progress>
      <span id="status">idle</span>
    </div>

    <div class="row">
      <input id="prompt" placeholder="Ask something…" disabled />
      <button id="send-btn" disabled>Send</button>
      <button id="abort-btn" disabled>Abort</button>
    </div>

    <pre id="output"></pre>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
