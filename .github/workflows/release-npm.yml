name: Release to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish localm-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke-install packed tarball in a fresh project and import
        run: |
          TARBALL=$(npm pack --silent)
          PKG_NAME=$(node -p "require('./package.json').name")
          mkdir -p /tmp/web-smoke && cd /tmp/web-smoke
          npm init -y >/dev/null
          npm pkg set type=module >/dev/null
          npm install --silent "$GITHUB_WORKSPACE/$TARBALL" "@mlc-ai/web-llm@^0.2.79"
          PKG_NAME="$PKG_NAME" node -e "import(process.env.PKG_NAME).then(m => { \
            if (!m.Chat) throw new Error('Chat task missing'); \
            if (!m.ChatReply) throw new Error('ChatReply result missing'); \
            if (!m.MODEL_PRESETS || !m.resolveModelPreset || !m.listSupportedModels) throw new Error('preset registry missing'); \
            if (!m.LocalmWebError) throw new Error('error hierarchy missing'); \
            if (!m.VERSION) throw new Error('no VERSION'); \
            console.log('Smoke OK · VERSION =', m.VERSION); \
          })"

      - name: Publish (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
