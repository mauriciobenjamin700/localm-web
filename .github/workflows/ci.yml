name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack (dry-run sanity)
        run: npm pack --dry-run

      - name: Smoke-install packed tarball and import in a fresh project
        run: |
          TARBALL=$(npm pack --silent)
          PKG_NAME=$(node -p "require('./package.json').name")
          mkdir -p /tmp/web-smoke && cd /tmp/web-smoke
          npm init -y >/dev/null
          npm pkg set type=module >/dev/null
          npm install --silent "$GITHUB_WORKSPACE/$TARBALL" "@mlc-ai/web-llm@^0.2.79"
          PKG_NAME="$PKG_NAME" node -e "import(process.env.PKG_NAME).then(m => { \
            if (!m.Chat) throw new Error('Chat task missing'); \
            if (!m.ChatReply) throw new Error('ChatReply result missing'); \
            if (!m.MODEL_PRESETS || !m.resolveModelPreset || !m.listSupportedModels) throw new Error('preset registry missing'); \
            if (!m.LocalmWebError) throw new Error('error hierarchy missing'); \
            if (!m.VERSION) throw new Error('no VERSION'); \
            console.log('Smoke OK · VERSION =', m.VERSION); \
          })"
